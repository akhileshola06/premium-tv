<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ PREMIUM NEXUS</title>
    
    <!-- Shaka Player -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.css">
    
    <style>
        /* 💎 Premium Dark UI Variables */
        :root {
            --primary: #00e5ff;
            --bg-dark: #0a0a0c;
            --card-bg: #151518;
            --text-light: #e0e0e0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            padding-bottom: 50px;
        }

        /* Sleek Header & Search */
        .top-nav {
            position: sticky;
            top: 0;
            background: rgba(10, 10, 12, 0.9);
            backdrop-filter: blur(15px);
            z-index: 1000;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .logo-text {
            margin: 0 0 15px 0;
            font-size: 1.5em;
            font-weight: 800;
            background: linear-gradient(90deg, #00e5ff, #b200ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .search-container {
            position: relative;
            max-width: 500px;
            margin: 0 auto;
        }

        .search-bar {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            color: white;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .search-bar:focus {
            border-color: var(--primary);
            background: rgba(0, 229, 255, 0.05);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #888;
        }

        /* Super Premium Video Player */
        .player-section {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        #video-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.05);
            display: none; /* Hide until video is selected */
        }

        video { width: 100%; height: 100%; outline: none; }

        /* Modern Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 15px;
            padding: 0 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 10px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.02);
            transition: transform 0.2s, box-shadow 0.2s;
            text-align: center;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 229, 255, 0.3);
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }

        .card img {
            width: 100%;
            height: 70px;
            object-fit: contain;
            border-radius: 8px;
            background: #fff;
            margin-bottom: 8px;
        }

        .card h3 {
            font-size: 0.75em;
            margin: 0;
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }

        .card:hover h3 { color: #fff; }

        /* Loader */
        .loader {
            text-align: center;
            padding: 50px;
            color: var(--primary);
            font-size: 1.2em;
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 50% { opacity: 0.3; } }
        
        .no-results {
            text-align: center;
            width: 100%;
            grid-column: 1 / -1;
            color: #888;
            padding: 30px;
        }
    </style>
</head>
<body>

    <!-- Sticky Nav with Search -->
    <div class="top-nav">
        <h1 class="logo-text">⚡ PREMIUM NEXUS</h1>
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" class="search-bar" placeholder="Search live channels, sports, news...">
        </div>
    </div>

    <!-- Video Player -->
    <div class="player-section">
        <div id="video-container">
            <video id="video" autoplay></video>
        </div>
    </div>

    <!-- Channels Grid -->
    <div class="grid" id="channelsGrid">
        <div class="loader">Initializing Broadcast Universe...</div>
    </div>

    <script>
        const API_URL = 'https://jtvxweb.pages.dev/jstr4web.json';
        let shakaPlayer;
        let globalChannels = []; // Search ke liye saare channels save karenge

        // Initialize Everything
        async function bootSystem() {
            initShaka();
            try {
                const response = await fetch(API_URL);
                globalChannels = await response.json();
                renderChannels(globalChannels);
            } catch (error) {
                document.getElementById('channelsGrid').innerHTML = '<div class="no-results">Network Error. Refresh the page.</div>';
            }
        }

        // Setup Shaka DRM Player
        function initShaka() {
            const video = document.getElementById('video');
            const videoContainer = document.getElementById('video-container');
            shakaPlayer = new shaka.Player(video);
            const ui = new shaka.ui.Overlay(shakaPlayer, videoContainer, video);
            
            // Error handling
            shakaPlayer.addEventListener('error', (e) => {
                console.error('Shaka Error:', e);
                // Sirf tab error dikhaye jab koi serious issue ho
                if(e.detail && e.detail.code !== 7000) {
                    alert("System Notice: Cannot decode stream. You must Host this website online (HTTPS) to bypass local DRM restrictions.");
                }
            });
        }

        // Render Cards to Grid
        function renderChannels(channels) {
            const grid = document.getElementById('channelsGrid');
            grid.innerHTML = ''; 

            if (channels.length === 0) {
                grid.innerHTML = '<div class="no-results">No channels found. Try another search.</div>';
                return;
            }

            channels.forEach(ch => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img loading="lazy" src="${ch.logo}" alt="${ch.name}" onerror="this.src='https://via.placeholder.com/100x70/222/fff?text=TV'">
                    <h3>${ch.name}</h3>
                `;
                
                card.onclick = () => {
                    document.getElementById('video-container').style.display = 'block';
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    startPlayback(ch.url, ch.keyId, ch.key);
                };
                grid.appendChild(card);
            });
        }

        // Live Search Filtering
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredChannels = globalChannels.filter(ch => 
                ch.name.toLowerCase().includes(searchTerm) || 
                ch.category.toLowerCase().includes(searchTerm)
            );
            renderChannels(filteredChannels);
        });

        // DRM Decryption & Play Logic
        async function startPlayback(url, keyId, keyInfo) {
            try {
                if (keyId && keyInfo && keyId !== "null" && keyInfo !== "null") {
                    shakaPlayer.configure({
                        drm: {
                            clearKeys: { [keyId]: keyInfo }
                        }
                    });
                } else {
                    shakaPlayer.configure({ drm: { clearKeys: {} } });
                }
                
                await shakaPlayer.load(url);
                document.getElementById('video').play();
            } catch (e) {
                console.error('Playback Error:', e);
            }
        }

        document.addEventListener('DOMContentLoaded', bootSystem);
    </script>
</body>
</html>
