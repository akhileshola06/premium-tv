<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ PREMIUM NEXUS</title>
    
    <!-- Shaka Player Core -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    
    <style>
        :root { --primary: #00e5ff; --bg-dark: #0a0a0c; --card-bg: #151518; --text-light: #e0e0e0; }
        body { background-color: var(--bg-dark); color: var(--text-light); font-family: sans-serif; margin: 0; padding-bottom: 50px; }
        .top-nav { position: sticky; top: 0; background: rgba(10, 10, 12, 0.9); backdrop-filter: blur(15px); z-index: 1000; padding: 15px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo-text { margin: 0 0 15px 0; font-size: 1.5em; font-weight: 800; background: linear-gradient(90deg, #00e5ff, #b200ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .search-container { position: relative; max-width: 500px; margin: 0 auto; }
        .search-bar { width: 100%; padding: 12px 20px 12px 45px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); color: white; font-size: 16px; outline: none; box-sizing: border-box; }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #888; }
        
        .player-section { padding: 10px; max-width: 800px; margin: 0 auto; }
        #video-container { width: 100%; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: none; }
        video { width: 100%; height: auto; outline: none; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 10px; cursor: pointer; border: 1px solid rgba(255,255,255,0.02); text-align: center; }
        .card img { width: 100%; height: 70px; object-fit: contain; border-radius: 8px; background: #fff; margin-bottom: 8px; }
        .card h3 { font-size: 0.75em; margin: 0; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .loader, .no-results { text-align: center; padding: 50px; color: var(--primary); }
    </style>
</head>
<body>

    <div class="top-nav">
        <h1 class="logo-text">⚡ PREMIUM NEXUS</h1>
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" class="search-bar" placeholder="Search channels...">
        </div>
    </div>

    <!-- Native Mobile Video Player -->
    <div class="player-section">
        <div id="video-container">
            <video id="video" controls autoplay playsinline></video>
        </div>
    </div>

    <div class="grid" id="channelsGrid">
        <div class="loader">Initializing Broadcast...</div>
    </div>

    <script>
        const API_URL = 'https://jtvxweb.pages.dev/jstr4web.json';
        let shakaPlayer;
        let globalChannels = [];

        async function bootSystem() {
            // Install essential polyfills for mobile browsers
            shaka.polyfill.installAll();
            
            if (!shaka.Player.isBrowserSupported()) {
                alert("Your browser doesn't support this player. Try Chrome.");
                return;
            }

            initShaka();
            try {
                const response = await fetch(API_URL);
                globalChannels = await response.json();
                renderChannels(globalChannels);
            } catch (error) {
                document.getElementById('channelsGrid').innerHTML = '<div class="no-results">Network Error. Refresh the page.</div>';
            }
        }

        function initShaka() {
            const video = document.getElementById('video');
            shakaPlayer = new shaka.Player(video);
            
            shakaPlayer.addEventListener('error', (e) => {
                console.error('Shaka Error:', e);
                // Alert exact error code if playback fails midway
                if (e.detail && e.detail.code) {
                    alert("Stream Error Code: " + e.detail.code);
                }
            });
        }

        function renderChannels(channels) {
            const grid = document.getElementById('channelsGrid');
            grid.innerHTML = ''; 
            channels.forEach(ch => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img loading="lazy" src="${ch.logo}"><br><h3>${ch.name}</h3>`;
                card.onclick = () => {
                    document.getElementById('video-container').style.display = 'block';
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    startPlayback(ch.url, ch.keyId, ch.key);
                };
                grid.appendChild(card);
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            renderChannels(globalChannels.filter(ch => ch.name.toLowerCase().includes(term) || ch.category.toLowerCase().includes(term)));
        });

        async function startPlayback(url, keyId, keyInfo) {
            try {
                if (keyId && keyInfo && keyId !== "null" && keyInfo !== "null") {
                    shakaPlayer.configure({
                        drm: { clearKeys: { [keyId]: keyInfo } }
                    });
                } else {
                    shakaPlayer.configure({ drm: { clearKeys: {} } });
                }
                
                await shakaPlayer.load(url);
                document.getElementById('video').play();
            } catch (e) {
                console.error(e);
                // IF VIDEO FAILS, SHOW EXACT REASON
                alert("Playback Failed! Error Code: " + e.code);
            }
        }

        document.addEventListener('DOMContentLoaded', bootSystem);
    </script>
</body>
</html>
