<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ PREMIUM NEXUS</title>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.css">
    
    <style>
        :root { --primary-color: #00e5ff; --secondary-color: #b200ff; --background-dark: #0a0a0c; --card-background: #151518; --text-light: #e0e0e0; }
        body { background-color: var(--background-dark); color: var(--text-light); font-family: sans-serif; margin: 0; padding-bottom: 60px; }
        .top-navigation { position: sticky; top: 0; background: rgba(10, 10, 12, 0.95); z-index: 1000; padding: 20px; text-align: center; }
        .brand-logo { margin: 0; font-size: 1.8em; font-weight: 900; color: var(--primary-color); }
        .search-input { width: 90%; max-width: 500px; padding: 12px; margin-top: 15px; border-radius: 20px; border: none; background: #222; color: white; outline: none; text-align: center; }
        .video-wrapper { padding: 10px; max-width: 900px; margin: 0 auto; }
        #video-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 10px; display: none; }
        video { width: 100%; height: 100%; outline: none; }
        .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .channel-card { background: var(--card-background); border-radius: 10px; padding: 10px; cursor: pointer; text-align: center; }
        .channel-card img { width: 100%; height: 60px; object-fit: contain; background: #fff; border-radius: 5px; margin-bottom: 8px; }
        .channel-card h3 { font-size: 0.8em; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .msg { text-align: center; padding: 40px; color: var(--primary-color); font-weight: bold; }
    </style>
</head>
<body>
    <div class="top-navigation">
        <h1 class="brand-logo">⚡ PREMIUM NEXUS</h1>
        <input type="text" id="searchInput" class="search-input" placeholder="Search Live TV...">
    </div>
    <div class="video-wrapper">
        <div id="video-container"><video id="video" controls autoplay playsinline></video></div>
    </div>
    <div class="channel-grid" id="channelsGrid"><div class="msg">Loading Channels...</div></div>

    <script>
        const API_URL = 'https://jtvxweb.pages.dev/jstr4web.json';
        let shakaPlayerInstance;
        let globalChannelList = [];

        async function initializeSystem() {
            shaka.polyfill.installAll();
            setupShakaPlayer();
            try {
                const response = await fetch(API_URL);
                globalChannelList = await response.json();
                renderChannelGrid(globalChannelList);
            } catch (error) {
                document.getElementById('channelsGrid').innerHTML = '<div class="msg">Database Connection Failed.</div>';
            }
        }

        function setupShakaPlayer() {
            const videoElement = document.getElementById('video');
            shakaPlayerInstance = new shaka.Player(videoElement);
            
            // 🛑 THE ULTIMATE FILTER: Har ek segment proxy se jayega
            shakaPlayerInstance.getNetworkingEngine().registerRequestFilter(function(type, request) {
                let url = request.uris[0];
                if (url.includes('jiotvmblive.cdn.jio.com') && !url.includes('/proxy/jiotv')) {
                    request.uris[0] = url.replace('https://jiotvmblive.cdn.jio.com', '/proxy/jiotv');
                } else if (url.includes('nw18live.cdn.jio.com') && !url.includes('/proxy/nw18')) {
                    request.uris[0] = url.replace('https://nw18live.cdn.jio.com', '/proxy/nw18');
                } else if (url.includes('times-ott-live.akamaized.net') && !url.includes('/proxy/times')) {
                    request.uris[0] = url.replace('https://times-ott-live.akamaized.net', '/proxy/times');
                }
            });

            shakaPlayerInstance.addEventListener('error', e => console.error('Shaka Error:', e.detail));
        }

        function renderChannelGrid(channelsToRender) {
            const gridContainer = document.getElementById('channelsGrid');
            gridContainer.innerHTML = ''; 
            channelsToRender.forEach(channel => {
                const card = document.createElement('div');
                card.className = 'channel-card';
                card.innerHTML = `<img loading="lazy" src="${channel.logo}"><h3>${channel.name}</h3>`;
                card.onclick = () => {
                    document.getElementById('video-container').style.display = 'block';
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    executePlayback(channel.url, channel.keyId, channel.key);
                };
                gridContainer.appendChild(card);
            });
        }

        document.getElementById('searchInput').addEventListener('input', e => {
            const term = e.target.value.toLowerCase();
            renderChannelGrid(globalChannelList.filter(ch => ch.name.toLowerCase().includes(term) || ch.category.toLowerCase().includes(term)));
        });

        async function executePlayback(streamUrl, drmKeyId, drmKeyInfo) {
            try {
                if (drmKeyId && drmKeyInfo && drmKeyId !== "null" && drmKeyInfo !== "null") {
                    shakaPlayerInstance.configure({ drm: { clearKeys: { [drmKeyId]: drmKeyInfo } } });
                } else {
                    shakaPlayerInstance.configure({ drm: { clearKeys: {} } });
                }
                
                // Hum original URL hi load karenge, Filter apne aap proxy add kar dega
                await shakaPlayerInstance.load(streamUrl);
                document.getElementById('video').play();
            } catch (error) {
                alert("Failed! Error: " + error.code);
            }
        }
        document.addEventListener('DOMContentLoaded', initializeSystem);
    </script>
</body>
</html>
